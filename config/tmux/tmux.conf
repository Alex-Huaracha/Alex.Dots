# -------------------------------------------
# Prefix key: Ctrl+a (instead of Ctrl+b)
# -------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -------------------------------------------
# General Configuration
# -------------------------------------------
# Enable 256 colors and true color (RGB) support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support (click, scroll, resize)
set -g mouse on

# Start windows at 1 instead of 0
set -g base-index 1

# Start panes at 1 instead of 0
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# -------------------------------------------
# Theme: Catppuccin (with transparency)
# -------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "rounded"

# -------------------------------------------
# Plugins (managed by TPM)
# -------------------------------------------
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults (history, escape delay, etc)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Pane navigation with h/j/k/l, split with |/-
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Theme (configured above)
set -g @plugin 'catppuccin/tmux#v2.1.3'

# -------------------------------------------
# Custom keybindings
# -------------------------------------------
source-file ~/.config/tmux/keybindings.conf

# -------------------------------------------
# Initialize TPM (must be at the end)
# -------------------------------------------
run '~/.tmux/plugins/tpm/tpm'

# -------------------------------------------
# Transparency override (after TPM)
# -------------------------------------------
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
