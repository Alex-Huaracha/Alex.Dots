# -------------------------------------------
# Prefix key: Ctrl+a (instead of Ctrl+b)
# -------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -------------------------------------------
# General Configuration
# -------------------------------------------
# Enable 256 colors and true color (RGB) support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support (click, scroll, resize)
set -g mouse on

# Start windows at 1 instead of 0
set -g base-index 1

# Start panes at 1 instead of 0
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Status bar position
set -g status-position top

# -------------------------------------------
# Theme: Ukiyo (multi-theme status bar)
# -------------------------------------------
set -g @ukiyo-theme "catppuccin/mocha"
set -g @ukiyo-ignore-window-colors true

# Only show CPU and RAM
set -g @ukiyo-plugins "cpu-usage ram-usage"

# -------------------------------------------
# Plugins (managed by TPM)
# -------------------------------------------
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults (history, escape delay, etc)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Pane navigation with h/j/k/l, split with |/-
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Theme with integrated modules (CPU, RAM, Git, etc.)
set -g @plugin 'Nybkox/tmux-ukiyo'

# Clipboard integration (copy to system clipboard)
set -g @plugin 'tmux-plugins/tmux-yank'

# -------------------------------------------
# Custom keybindings
# -------------------------------------------
source-file ~/.config/tmux/keybindings.conf

# -------------------------------------------
# Initialize TPM (must be at the end)
# -------------------------------------------
run '~/.tmux/plugins/tpm/tpm'

# -------------------------------------------
# Transparency override (after TPM)
# -------------------------------------------
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
