# Open lazygit in a popup [<C-a> g](80% width and height)
bind g display-popup -d '#{pane_current_path}' -w 80% -h 80% -E lazygit

# Toggle floating terminal [Alt+g]
bind -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  display-popup -d '#{pane_current_path}' -w 80% -h 80% -E "tmux new-session -A -s scratch"
}
