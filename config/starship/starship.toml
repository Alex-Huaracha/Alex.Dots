# ============================================
# Alex.Dots - Starship Prompt Configuration
# ============================================
# Documentation: https://starship.rs/config/
# ============================================

# Timeout for commands (ms)
command_timeout = 1000

# Newline between prompts
add_newline = true

# ============================================
# Prompt Format
# ============================================
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$line_break\
$character"""

# ============================================
# Directory
# ============================================
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "

# ============================================
# Git Branch
# ============================================
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

# ============================================
# Git Status
# ============================================
[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "S"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "x${count}"

# ============================================
# Node.js
# ============================================
[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version)]($style) "
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

# ============================================
# Character (prompt symbol)
# ============================================
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# ============================================
# Disabled Modules (for performance)
# ============================================
[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[package]
disabled = true
